name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  policy:
    name: Policy & Conventions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate agent manifest
        run: python scripts/validate_agents_manifest.py

      - name: Validate backend structure and naming conventions
        run: bash scripts/validate_backend_conventions.sh

      - name: Validate text encodings
        run: python scripts/check_text_encoding.py

  backend_quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - policy
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-django

      - name: Run Ruff
        run: ruff check .

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run backend tests
        run: pytest

  api_schema:
    name: API Schema Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - backend_quality
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate OpenAPI schema
        run: python manage.py spectacular --validate --fail-on-warn

  audit_policy:
    name: Audit Policy & Schema Guards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - backend_quality
      - api_schema
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django

      - name: Run audit coverage test suite
        run: |
          pytest \
            apps/common/tests/unit/services/test_error_mapping_service.py \
            apps/common/tests/unit/services/test_audit_service.py \
            apps/common/tests/unit/services/test_idempotency_service.py \
            apps/common/tests/unit/services/test_outbox_service.py \
            apps/common/tests/unit/services/test_audit_reader_service.py \
            apps/common/tests/unit/services/test_audit_context_service.py \
            apps/common/tests/unit/services/test_constants_registry.py \
            apps/common/tests/unit/services/test_distributed_lock_service.py \
            apps/common/tests/unit/services/test_platform_settings_service.py \
            apps/common/tests/unit/services/test_tenant_context_service.py \
            apps/common/tests/unit/models/test_soft_delete_model.py \
            apps/common/tests/integration/api/test_audit_event_api.py \
            apps/common/tests/integration/api/test_audit_ops_api.py \
            apps/common/tests/integration/api/test_audit_schema_contract.py \
            apps/common/tests/integration/api/test_platform_api.py \
            apps/common/tests/integration/services/test_platform_operations.py \
            apps/accounts/tests/unit/services/test_account_user_service.py \
            apps/accounts/tests/unit/services/test_account_security_service.py \
            apps/accounts/tests/integration/api/test_account_user_api.py

      - name: Run platform compliance check
        run: |
          python manage.py migrate --noinput
          python manage.py common_platform_check --window-hours 24 --fail-on-error
          python manage.py tenant_consistency_check --fail-on-error

  frontend_quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - policy
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run frontend tests (if present)
        run: npm run test --if-present

      - name: Run production build
        run: npm run build

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - policy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
